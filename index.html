<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;min-height:100vh;padding:8px 4px 16px;user-select:none;transition:background 1s;overflow-x:hidden}
h1{font-size:16px;font-weight:700;margin-bottom:4px;letter-spacing:1px}
#info{display:flex;gap:14px;margin-bottom:3px;font-size:13px;flex-wrap:wrap;justify-content:center}
#info span b{font-weight:700}

/* hint box */
#hint-box{display:flex;align-items:center;gap:8px;margin-bottom:5px;padding:5px 14px;border-radius:12px;border:2px solid;font-size:13px;font-weight:600;transition:all .4s}
#hint-emoji{font-size:28px;line-height:1}
#hint-text{display:flex;flex-direction:column;gap:1px}
#hint-cat{font-size:10px;text-transform:uppercase;letter-spacing:1px;opacity:.7}
#hint-word-label{font-size:12px}

/* word display */
#word-display{font-size:20px;letter-spacing:5px;margin-bottom:5px;min-height:32px;text-align:center}
#word-display span{display:inline-block;width:28px;text-align:center;border-bottom:3px solid #ccc;color:#bbb;transition:all .25s;font-weight:700}
#word-display span.collected{font-weight:900}
#word-display span.next-hint{animation:pulse 0.8s infinite alternate}
@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.15)}}

/* canvas wrap */
.game-wrap{position:relative;width:min(400px,96vw)}
canvas{border-radius:12px;display:block;width:100%}
#bg-canvas{position:absolute;top:0;left:0;width:100%;height:100%;border-radius:12px;pointer-events:none}
#game-canvas{position:relative;z-index:2;width:100%;height:auto}

/* shake */
@keyframes shake{0%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}100%{transform:translateX(0)}}
.shake{animation:shake .35s ease}

/* celebrate overlay */
#celebrate{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;pointer-events:none;opacity:0;transition:opacity .3s;border-radius:12px}
#celebrate.show{opacity:1}
#emoji-big{font-size:0;transition:font-size .4s cubic-bezier(.175,.885,.32,1.275),transform .3s;transform:scale(0);line-height:1}
#emoji-big.pop{font-size:72px;transform:scale(1)}
#praise{font-size:22px;font-weight:900;margin-top:4px;opacity:0;transition:opacity .4s}
#praise.show{opacity:1}
#word-spoken{font-size:22px;font-weight:700;margin-top:4px;letter-spacing:4px;opacity:0;transition:opacity .4s}
#word-spoken.show{opacity:1}
#letter-highlight{font-size:30px;font-weight:900;min-height:36px}

/* freeze flash */
#freeze-flash{position:absolute;top:0;left:0;width:100%;height:100%;border-radius:12px;background:rgba(255,50,50,.0);pointer-events:none;z-index:9;transition:background .15s}
#freeze-flash.active{background:rgba(255,50,50,.22)}

#msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:17px;font-weight:600;text-align:center;pointer-events:none;padding:12px 20px;border-radius:12px;border:2px solid;white-space:pre-line;z-index:20;opacity:0;transition:opacity .3s}
#msg.show{opacity:1}

/* controls */
#btn-row{margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
button{background:#fff;border:2px solid #ddd;color:#555;padding:5px 14px;border-radius:8px;cursor:pointer;font-size:13px;transition:all .2s;box-shadow:0 1px 4px rgba(0,0,0,.08);font-weight:600}
button:hover{border-color:#888;color:#222}
button:active{transform:scale(.95)}

/* dpad */
#dpad{display:grid;grid-template-columns:50px 50px 50px;grid-template-rows:50px 50px;gap:5px;margin-top:10px}
#dpad button{width:50px;height:50px;font-size:22px;padding:0;border-radius:10px;display:flex;align-items:center;justify-content:center}
#btn-up{grid-column:2;grid-row:1}
#btn-left{grid-column:1;grid-row:2}
#btn-down{grid-column:2;grid-row:2}
#btn-right{grid-column:3;grid-row:2}

/* leaderboard */
#lb-panel{width:min(400px,96vw);margin-top:10px;border-radius:10px;overflow:hidden;border:2px solid #ddd}
#lb-header{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer}
#lb-body{display:none;padding:0 0 6px}
#lb-body.open{display:block}
#lb-list{list-style:none;padding:0 14px}
#lb-list li{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(0,0,0,.06);font-size:13px}
#lb-list li:last-child{border-bottom:none}
.medal{font-size:16px;width:22px}
.lb-name{flex:1;margin:0 8px;font-size:12px;color:#888}
.lb-score{font-weight:700;min-width:40px;text-align:right}
.lb-lvl{color:#aaa;font-size:11px;min-width:36px;text-align:right;margin-left:6px}
#lb-clear{display:block;margin:4px 14px 0;font-size:11px;color:#aaa;text-align:right;cursor:pointer;background:none;border:none;box-shadow:none;padding:0;font-weight:400}
#lb-clear:hover{color:#c00}
#footer-hint{font-size:11px;color:#aaa;margin-top:6px;text-align:center}
</style>

// --- particles ---
let particles=[];
function initParticles(t){
  particles=[];
  for(let i=0;i<34;i++)particles.push({
    x:Math.random()*400,y:Math.random()*400,
    vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,
    size:7+Math.random()*12,ch:t.pe[Math.floor(Math.random()*t.pe.length)],
    alpha:.14+Math.random()*.2,rot:Math.random()*Math.PI*2,vrot:(Math.random()-.5)*.01
  });
}
let bgAnim;
function startBg(t){
  cancelAnimationFrame(bgAnim);
  (function fr(){
    bgX.clearRect(0,0,400,400);
    const g=bgX.createLinearGradient(0,0,400,400);
    g.addColorStop(0,t.bg1);g.addColorStop(1,t.bg2);
    bgX.fillStyle=g;bgX.fillRect(0,0,400,400);
    particles.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.rot+=p.vrot;
      if(p.x<-20)p.x=420;if(p.x>420)p.x=-20;
      if(p.y<-20)p.y=420;if(p.y>420)p.y=-20;
      bgX.save();bgX.globalAlpha=p.alpha;
      bgX.font=`${p.size}px sans-serif`;
      bgX.textAlign='center';bgX.textBaseline='middle';
      bgX.translate(p.x,p.y);bgX.rotate(p.rot);
      bgX.fillText(p.ch,0,0);bgX.restore();
    });
    bgAnim=requestAnimationFrame(fr);
  })();
}

// --- speech ---
function speakWord(word,onDone){
  if(!window.speechSynthesis){onDone&&onDone();return;}
  speechSynthesis.cancel();
  const lh=document.getElementById('letter-highlight');
  const ws=document.getElementById('word-spoken');
  const lts=[...word];let i=0;
  lh.textContent='';ws.textContent='';ws.classList.remove('show');
  function next(){
    if(i<lts.length){
      lh.textContent=lts[i];
      const u=new SpeechSynthesisUtterance(lts[i]);
      u.lang='uk-UA';u.rate=.75;u.pitch=1.2;
      u.onend=()=>{i++;setTimeout(next,200);};
      speechSynthesis.speak(u);
    } else {
      lh.textContent='';
      setTimeout(()=>{
        ws.textContent=word;ws.classList.add('show');
        const u=new SpeechSynthesisUtterance(word);
        u.lang='uk-UA';u.rate=.7;u.pitch=1;
        u.onend=()=>setTimeout(()=>{onDone&&onDone();},500);
        speechSynthesis.speak(u);
      },250);
    }
  }
  setTimeout(next,400);
}

// error sound
function buzzSound(){
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    const o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.type='square';o.frequency.setValueAtTime(120,ac.currentTime);
    g.gain.setValueAtTime(.18,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.3);
    o.start();o.stop(ac.currentTime+.3);
  }catch(e){}
}

// --- leaderboard ---
const LB_KEY='snakeReadLB_v2';
function loadLb(){try{return JSON.parse(localStorage.getItem(LB_KEY)||'[]');}catch{return[];}}
function saveLb(d){try{localStorage.setItem(LB_KEY,JSON.stringify(d));}catch{}}
function addLbEntry(score,level){
  const d=loadLb();
  d.push({score,level,date:new Date().toLocaleDateString('uk-UA')});
  d.sort((a,b)=>b.score-a.score);
  saveLb(d.slice(0,10));renderLb();
}
function clearLb(){if(confirm('Очистити таблицю?')){saveLb([]);renderLb();}}
const MEDALS=['🥇','🥈','🥉'];
function renderLb(){
  const d=loadLb();
  const ul=document.getElementById('lb-list');
  if(!d.length){ul.innerHTML='<li style="color:#aaa;justify-content:center;font-size:12px;padding:8px">Поки немає результатів</li>';return;}
  ul.innerHTML=d.map((e,i)=>`<li><span class="medal">${MEDALS[i]||`${i+1}.`}</span><span class="lb-name">${e.date}</span><span class="lb-score">${e.score}⭐</span><span class="lb-lvl">рів.${e.level}</span></li>`).join('');
  if(th){document.getElementById('lb-panel').style.background=th.hbBg;document.getElementById('lb-header').style.color=th.hbText;}
}
function toggleLb(){
  const b=document.getElementById('lb-body'),a=document.getElementById('lb-arrow');
  b.classList.toggle('open');a.textContent=b.classList.contains('open')?'▲':'▼';
  if(b.classList.contains('open'))renderLb();
}

// --- game state ---
let snake,dir,nextDir,letters,wordIdx,word,wordEmoji,cat,th;
let score,best=0,level,gameLoop,paused=false,alive=false,frozen=false;
let usedWords=[];

function rnd(n){return Math.floor(Math.random()*n);}
function getSpeed(){return Math.max(160,380-level*20);}

function applyTheme(t){
  th=t;
  document.body.style.background=`linear-gradient(135deg,${t.bg1},${t.bg2})`;
  document.getElementById('title').style.color=t.title;
  document.getElementById('info').style.color=t.cat;
  const hb=document.getElementById('hint-box');
  hb.style.background=t.hbBg;hb.style.borderColor=t.hbBorder;hb.style.color=t.hbText;
  document.getElementById('word-spoken').style.color=t.wCol;
  document.getElementById('letter-highlight').style.color=t.head;
  document.getElementById('praise').style.color=t.hbText;
  document.getElementById('lb-panel').style.background=t.hbBg;
  document.getElementById('lb-header').style.color=t.hbText;
  document.querySelectorAll('#dpad button').forEach(b=>{b.style.borderColor=t.head;b.style.color=t.title;});
}

function getWord(){
  // pick random from all words, avoid repeats until exhausted
  let pool=WORDS.filter(w=>!usedWords.includes(w.w));
  if(!pool.length){usedWords=[];pool=WORDS;}
  const wObj=pool[rnd(pool.length)];
  usedWords.push(wObj.w);
  return wObj;
}

function updateHintBox(){
  document.getElementById('hint-emoji').textContent=wordEmoji;
  document.getElementById('hint-cat').textContent=cat;
  document.getElementById('hint-word-label').textContent='Збери слово по буквах!';
}

function initLevel(){
  const wObj=getWord();
  word=wObj.w;cat=wObj.cat;wordEmoji=wObj.e;
  th=THEMES[cat]||THEMES['Овочі'];
  applyTheme(th);initParticles(th);startBg(th);
  updateHintBox();
  wordIdx=0;renderWordDisplay();
  snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir={x:1,y:0};nextDir={x:1,y:0};
  frozen=false;
  placeLetters();draw();
}

function placeLetters(){
  letters=[];
  const needed=word.split('');
  const extra='АБВГДЕЄЖЗИІЇЙКЛМНОПРСТУФХЦЧШЩЬЮЯ'.split('').filter(c=>!needed.includes(c));
  const all=[...needed];
  for(let i=0;i<Math.min(6,extra.length);i++)all.push(extra[rnd(extra.length)]);
  const used=new Set(snake.map(s=>`${s.x},${s.y}`));
  const pos=[];
  while(pos.length<all.length){
    const p={x:2+rnd(COLS-4),y:2+rnd(ROWS-4)};
    const k=`${p.x},${p.y}`;
    if(!used.has(k)){used.add(k);pos.push(p);}
  }
  for(let i=0;i<all.length;i++)letters.push({x:pos[i].x,y:pos[i].y,ch:all[i]});
}

function renderWordDisplay(){
  const d=document.getElementById('word-display');
  d.innerHTML=word.split('').map((ch,i)=>{
    const ok=i<wordIdx,isNext=i===wordIdx;
    let st=ok?`color:${th.wCol};border-color:${th.wCol}`:(isNext?`color:${th.lNT};border-color:${th.lNB}`:'color:#bbb;border-color:#ddd');
    return `<span class="${ok?'collected':''} ${isNext?'next-hint':''}" style="${st}">${ch}</span>`;
  }).join('');
}

function startGame(){
  score=0;level=1;alive=true;paused=false;frozen=false;usedWords=[];
  document.getElementById('score').textContent=0;
  document.getElementById('lvl').textContent=1;
  hideMsg();hideCelebrate();clearInterval(gameLoop);
  initLevel();
  gameLoop=setInterval(tick,getSpeed());
}

function togglePause(){
  if(!alive)return;
  paused=!paused;
  if(!paused){clearInterval(gameLoop);gameLoop=setInterval(tick,getSpeed());hideMsg();}
  else showMsg('Пауза ⏸\nПродовжити → «Пауза»');
}

function e2d(ev,x,y){ev.preventDefault();dpad(x,y);}
function dpad(x,y){if(!alive||paused||frozen)return;const nd={x,y};if(dir&&(nd.x!==-dir.x||nd.y!==-dir.y))nextDir=nd;}

function freezeSnake(){
  frozen=true;
  buzzSound();
  const ff=document.getElementById('freeze-flash');
  ff.classList.add('active');
  const gw=document.getElementById('gwrap');
  gw.classList.add('shake');
  setTimeout(()=>{ff.classList.remove('active');gw.classList.remove('shake');},350);
  setTimeout(()=>{frozen=false;},1000);
}

function tick(){
  if(paused||!alive||frozen)return;
  dir=nextDir;
  const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS){gameOver();return;}
  if(snake.some(s=>s.x===head.x&&s.y===head.y)){gameOver();return;}
  snake.unshift(head);
  let ate=false;
  for(let i=0;i<letters.length;i++){
    const l=letters[i];
    if(l.x===head.x&&l.y===head.y){
      if(l.ch===word[wordIdx]){
        wordIdx++;score+=10*level;
        document.getElementById('score').textContent=score;
        renderWordDisplay();letters.splice(i,1);ate=true;
        if(wordIdx===word.length){
          clearInterval(gameLoop);
          level++;score+=50;
          document.getElementById('score').textContent=score;
          document.getElementById('lvl').textContent=level;
          if(score>best){best=score;document.getElementById('best').textContent=best;}
          showCelebrate();return;
        }
      } else {
        score=Math.max(0,score-3);
        document.getElementById('score').textContent=score;
        letters.splice(i,1);ate=true;
        freezeSnake();
      }
      break;
    }
  }
  if(!ate)snake.pop();
  if(letters.length<word.length-wordIdx+3)addExtraLetter();
  draw();
}

function addExtraLetter(){
  const used=new Set(snake.map(s=>`${s.x},${s.y}`).concat(letters.map(l=>`${l.x},${l.y}`)));
  let p;
  do{p={x:2+rnd(COLS-4),y:2+rnd(ROWS-4)};}while(used.has(`${p.x},${p.y}`));
  const rem=word.slice(wordIdx);
  letters.push({x:p.x,y:p.y,ch:rem[rnd(rem.length)]});
}

function gameOver(){
  alive=false;clearInterval(gameLoop);
  addLbEntry(score,level);
  if(score>best){best=score;document.getElementById('best').textContent=best;}
  showMsg(`Гра закінчена! 😢\nЗібрано ⭐ ${score}\nНатисни «Нова гра»`);
  draw();
  const b=document.getElementById('lb-body'),a=document.getElementById('lb-arrow');
  b.classList.add('open');a.textContent='▲';renderLb();
}

function showCelebrate(){
  const cel=document.getElementById('celebrate');
  const eb=document.getElementById('emoji-big');
  const pr=document.getElementById('praise');
  const ws=document.getElementById('word-spoken');
  const lh=document.getElementById('letter-highlight');
  eb.textContent=wordEmoji;
  pr.textContent=PRAISE[rnd(PRAISE.length)];
  ws.textContent='';ws.classList.remove('show');lh.textContent='';pr.classList.remove('show');
  cel.style.background=th.msgBg;cel.classList.add('show');
  setTimeout(()=>{eb.classList.add('pop');},50);
  setTimeout(()=>{pr.classList.add('show');},400);
  speakWord(word,()=>{
    setTimeout(()=>{hideCelebrate();initLevel();gameLoop=setInterval(tick,getSpeed());},700);
  });
}
function hideCelebrate(){
  const cel=document.getElementById('celebrate');
  cel.classList.remove('show');
  document.getElementById('emoji-big').classList.remove('pop');
  document.getElementById('word-spoken').classList.remove('show');
  document.getElementById('praise').classList.remove('show');
}

function draw(){
  if(!th)return;
  ctx.clearRect(0,0,400,400);
  // letters — bigger font for kids
  letters.forEach(l=>{
    const isNext=l.ch===word[wordIdx];
    if(isNext){ctx.shadowColor=th.lNB;ctx.shadowBlur=12;}
    ctx.fillStyle=isNext?'#ffffff':'#f8f8f8';
    ctx.strokeStyle=isNext?th.lNB:th.lOB;ctx.lineWidth=isNext?2.5:1.5;
    ctx.beginPath();ctx.roundRect(l.x*CELL,l.y*CELL,CELL,CELL,5);
    ctx.fill();ctx.stroke();ctx.shadowBlur=0;
    ctx.fillStyle=isNext?th.lNT:th.lOT;
    ctx.font=`bold ${CELL-3}px sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(l.ch,l.x*CELL+CELL/2,l.y*CELL+CELL/2+1);
  });
  // snake
  snake.forEach((s,i)=>{
    if(i===0){ctx.shadowColor=th.head;ctx.shadowBlur=14;ctx.fillStyle=th.head;}
    else{ctx.shadowBlur=0;const idx=Math.min(2,Math.floor(i/Math.max(1,snake.length/3)));ctx.fillStyle=th.body[idx];}
    ctx.beginPath();ctx.roundRect(s.x*CELL+1,s.y*CELL+1,CELL-2,CELL-2,i===0?6:3);
    ctx.fill();ctx.shadowBlur=0;
    if(i===0){
      const ex=dir.x,ey=dir.y,ox=ey*3,oy=ex*3;
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(s.x*CELL+CELL/2+ex*4+ox,s.y*CELL+CELL/2+ey*4+oy,3,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(s.x*CELL+CELL/2+ex*4-ox,s.y*CELL+CELL/2+ey*4-oy,3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#222';
      ctx.beginPath();ctx.arc(s.x*CELL+CELL/2+ex*4+ox,s.y*CELL+CELL/2+ey*4+oy,1.5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(s.x*CELL+CELL/2+ex*4-ox,s.y*CELL+CELL/2+ey*4-oy,1.5,0,Math.PI*2);ctx.fill();
      const tx=s.x*CELL+CELL/2+ex*10,ty=s.y*CELL+CELL/2+ey*10;
      ctx.strokeStyle=th.tongue;ctx.lineWidth=1.5;
      ctx.beginPath();
      ctx.moveTo(s.x*CELL+CELL/2+ex*8,s.y*CELL+CELL/2+ey*8);
      ctx.lineTo(tx,ty);ctx.lineTo(tx+ey*3+ex*2,ty+ex*3+ey*2);
      ctx.moveTo(tx,ty);ctx.lineTo(tx-ey*3+ex*2,ty-ex*3+ey*2);
      ctx.stroke();
    }
  });
}

function showMsg(t){const m=document.getElementById('msg');if(th){m.style.background=th.msgBg;m.style.borderColor=th.msgBorder;m.style.color=th.msgText;}m.innerHTML=t.replace(/\n/g,'<br>');m.classList.add('show');}
function hideMsg(){document.getElementById('msg').classList.remove('show');}

document.addEventListener('keydown',e=>{
  const map={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0}};
  if(map[e.key]){e.preventDefault();if(!frozen)dpad(map[e.key].x,map[e.key].y);}
});

// init
th=THEMES['Овочі'];applyTheme(th);initParticles(th);startBg(th);renderLb();
setTimeout(()=>{
  ctx.fillStyle=th.title;ctx.font='bold 17px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('Натисни «Нова гра» 🐍',200,200);
},80);
</script>
</body>
